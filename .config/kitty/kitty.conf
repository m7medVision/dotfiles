# Gruvbox dark palette with Arabic-capable font mapping.
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Render Arabic code points with an Arabic-capable font while keeping
# JetBrains Mono for Latin text and programming glyphs.
symbol_map U+0600-U+06FF,U+0750-U+077F,U+08A0-U+08FF,U+FB50-U+FDFF,U+FE70-U+FEFF Noto Naskh Arabic

cursor_shape          block
cursor_blink_interval 0.75
scrollback_lines      10000
window_padding_width  10
enable_audio_bell     no
shell_integration     enabled

foreground            #ebdbb2
background            #282828
selection_foreground  #fbf1c7
selection_background  #504945
cursor                #ebdbb2
cursor_text_color     #282828

color0  #282828
color1  #cc241d
color2  #98971a
color3  #d79921
color4  #458588
color5  #b16286
color6  #689d6a
color7  #a89984
color8  #928374
color9  #fb4934
color10 #b8bb26
color11 #fabd2f
color12 #83a598
color13 #d3869b
color14 #8ec07c
color15 #ebdbb2

# Disable Ctrl+Shift+Right and Ctrl+Shift+Left for Tmux compatibility
map ctrl+shift+right no_op
map ctrl+shift+left no_op
