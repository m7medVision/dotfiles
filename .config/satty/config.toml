# Satty screenshot annotation config
# Docs: https://github.com/Satty-org/Satty
# Lives at XDG_CONFIG_HOME/satty/config.toml

[general]
# Open in fullscreen over the captured image; post-crop inside Satty.
fullscreen = true
# Tool active on startup [pointer|crop|line|arrow|rectangle|ellipse|text|marker|blur|highlight|brush]
initial-tool = "arrow"
# Copy via wl-clipboard (Wayland). Comment out for X11 (xclip/xsel).
copy-command = "wl-copy"
# Default save target. ~ and chrono strftime specifiers are supported.
output-filename = "~/Pictures/Screenshots/satty-%Y-%m-%d_%H:%M:%S.png"
# Slightly larger annotations.
annotation-size-factor = 2
# Rounded rectangle corners (0 = square).
corner-roundness = 12
default-hide-toolbars = false
default-fill-shapes = false
# Block highlighter by default; hold Ctrl while highlighting for freehand.
primary-highlighter = "block"
# Request no title bar (compositor has final say).
no-window-decoration = true
# Quit after any save/copy so the flow stays one-shot.
early-exit = true
# Keep a file copy whenever you copy to clipboard.
save-after-copy = false

# What happens on Enter / Esc / right-click (order matters).
# After copying/saving we also exit (see early-exit above).
actions-on-enter = ["save-to-clipboard", "exit"]
actions-on-escape = ["exit"]
actions-on-right-click = ["save-to-clipboard", "exit"]

[keybinds]
pointer   = "p"
crop      = "c"
brush     = "b"
line      = "i"
arrow     = "z"
rectangle = "r"
ellipse   = "e"
text      = "t"
marker    = "m"
blur      = "u"
highlight = "g"

[font]
family = "Roboto"
style  = "Regular"

[color-palette]
# Quick-pick swatches in the toolbar (keys 1-0 map to these).
palette = [
    "#e0af68",
    "#f7768e",
    "#7dcfff",
    "#9ece6a",
    "#bb9af7",
    "#7aa2f7",
]
# Presets in the custom color picker.
custom = [
    "#c0caf5",
    "#ff9e64",
    "#73daca",
    "#1abc9c",
    "#e91e63",
    "#ffffff",
]
