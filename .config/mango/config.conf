# More option see https://github.com/DreamMaoMao/mango/wiki/

# Window effect
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0

border_radius=6
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
edge_scroller_focus_allow_speed=0.0
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Dwindle Layout Setting
dwindle_smart_split=0
dwindle_drop_simple_split=1
dwindle_manual_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_preserve_split=0

# Overview Setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=1
ov_no_resize=1
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1
drag_tile_small=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=1
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=5
gappiv=5
gappoh=10
gappov=10
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=4
dropcolor=0x8FBA7C55
splitcolor=0xEB441EFF

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# Autostart
exec-once=qs -c noctalia-shell
exec-once=vicinae server --replace
exec-once=xwayland-satellite
# Clipboard persistence — keeps the selection alive after the source app
# closes (fixes the "copy multiple times / can't paste" issue).
# History is handled natively by vicinae (clipboard:history entrypoint),
# so no cliphist daemon is needed here.
exec-once=wl-clip-persist --clipboard regular --reconnect-tries 0

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none
#
# Design: SUPER is the WM modifier — mirrors GNOME conventions.
# Alt and Ctrl are left free for applications.

# reload config
bind=SUPER,r,reload_config

# launcher and terminal (GNOME-style: Super+A = Activities, Super+Enter = terminal)
bind=SUPER,a,spawn,vicinae toggle
bind=SUPER,Return,spawn,ghostty

# Clipboard history
bind=SUPER,V,spawn,vicinae vicinae://launch/clipboard/history

# Screenshots
# Print=region  Ctrl+Print=fullscreen  Shift+Print=focused window
bind=NONE,Print,spawn,$HOME/.config/mango/scripts/screenshot.sh region
bind=CTRL,Print,spawn,$HOME/.config/mango/scripts/screenshot.sh fullscreen
bind=SHIFT,Print,spawn,$HOME/.config/mango/scripts/screenshot.sh window

# exit / close (Alt+F4 = universal close; Super+Shift+E = quit WM)
bind=SUPER+SHIFT,e,quit
bind=ALT,F4,killclient,

# lock screen (GNOME standard: Super+L)
bindl=SUPER,l,spawn_shell,qs -c noctalia-shell ipc call lockScreen lock

# window focus — directional (SUPER + arrows)
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# window state
bind=SUPER,g,toggleglobal,
bind=SUPER,Tab,toggleoverview,
bind=SUPER+SHIFT,space,togglefloating,
bind=SUPER,m,togglemaximizescreen,
bind=SUPER,f,togglefullscreen,
bind=SUPER+SHIFT,f,togglefakefullscreen,
bind=SUPER,h,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,h,restore_minimized
bind=SUPER,z,toggle_scratchpad

# scroller layout
bind=SUPER,e,set_proportion,1.0
bind=SUPER,x,switch_proportion_preset,
bind=SUPER,bracketleft,scroller_stack,left
bind=SUPER,bracketright,scroller_stack,right
bind=SUPER+CTRL,bracketleft,scroller_stack,up
bind=SUPER+CTRL,bracketright,scroller_stack,down

# dwindle layout (manual split mode)
bind=SUPER+SHIFT,Return,dwindle_toggle_split_direction

# switch layout
bind=SUPER,n,switch_layout

# workspace navigation (GNOME style: Super+Ctrl+arrows)
bind=CTRL+SUPER,Left,viewtoleft,0
bind=CTRL+SUPER,Right,viewtoright,0
bind=CTRL+SHIFT+SUPER,Left,tagtoleft,0
bind=CTRL+SHIFT+SUPER,Right,tagtoright,0

# view tag by number (GNOME style: Super+number)
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# move window to tag (GNOME style: Super+Shift+number)
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# monitor switch (comma/period = prev/next monitor)
bind=SUPER,comma,focusmon,left
bind=SUPER,period,focusmon,right
bind=SUPER+SHIFT,comma,tagmon,left
bind=SUPER+SHIFT,period,tagmon,right

# gaps
bind=SUPER,equal,incgaps,1
bind=SUPER,minus,incgaps,-1
bind=SUPER+SHIFT,g,togglegaps

# resize window (Super+Alt+arrows)
bind=SUPER+ALT,Up,resizewin,+0,-50
bind=SUPER+ALT,Down,resizewin,+0,+50
bind=SUPER+ALT,Left,resizewin,-50,+0
bind=SUPER+ALT,Right,resizewin,+50,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize


# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# Gesture Bindings (touchpad)
# format: gesturebind=MOD,DIRECTION,FINGERS,FUNCTION[,args...]
# direction: up/down/left/right (dominant axis wins). fingers: 3 or 4 typical
# 3-finger: workspaces + overview
gesturebind=none,left,3,viewtoleft_have_client
gesturebind=none,right,3,viewtoright_have_client
gesturebind=none,up,3,toggleoverview
gesturebind=none,down,3,toggleoverview
# 4-finger: switch monitor
gesturebind=none,left,4,focusmon,left
gesturebind=none,right,4,focusmon,right


# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi

# This sources the noctalia theme

source = /home/mohammed/.config/mango/noctalia.conf

