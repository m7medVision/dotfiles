# ─────────────────────────────────────────────────────────────────────
# Status bar — Gruvbox dark (Powerline / Nerd Font)
# ─────────────────────────────────────────────────────────────────────

set -g status-style "bg=#282828,fg=#ebdbb2,none"
set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#fabd2f"
set -g popup-style "bg=#1d2021,fg=#ebdbb2"
set -g popup-border-style "fg=#504945"
set -g message-style "bg=#fabd2f,fg=#282828,bold"
set -g message-command-style "bg=#fe8019,fg=#282828,bold"
setw -g mode-style "bg=#fabd2f,fg=#282828,bold"
setw -g clock-mode-colour "#fabd2f"

# Left — session (green block)
set -g status-left ' #[fg=#282828,bg=#b8bb26,bold] #S #[bg=#282828,nobold] '

# Windows — dim inactive, solid yellow block for the active one
setw -g window-status-format '#[fg=#7c6f64,bg=#282828] #I:#W#F '
setw -g window-status-current-format '#[fg=#282828,bg=#fabd2f,bold] #I:#W#F '
setw -g window-status-activity-style "fg=#fe8019,bg=#282828"
setw -g window-status-bell-style "fg=#fb4934,bg=#282828,bold"

# Right — git · dir · date · time (flat blocks)
set -g status-right '#[fg=#8ec07c,bg=#3c3836] #(git -C "#{pane_current_path}" rev-parse --abbrev-ref HEAD 2>/dev/null || echo -) #[fg=#a89984,bg=#282828] #[fg=#d3869b,bg=#3c3836] #{b:pane_current_path} #[fg=#a89984,bg=#282828] #[fg=#ebdbb2,bg=#3c3836] %a %d %b #[fg=#a89984,bg=#282828] #[fg=#282828,bg=#fabd2f,bold] %H:%M '
