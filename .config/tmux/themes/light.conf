# ─────────────────────────────────────────────────────────────────────
# Status bar — Gruvbox light (Powerline / Nerd Font)
# ─────────────────────────────────────────────────────────────────────

set -g status-style "bg=#fbf1c7,fg=#3c3836,none"
set -g pane-border-style "fg=#d5c4a1"
set -g pane-active-border-style "fg=#b57614"
set -g popup-style "bg=#fbf1c7,fg=#3c3836"
set -g popup-border-style "fg=#d5c4a1"
set -g message-style "bg=#b57614,fg=#fbf1c7,bold"
set -g message-command-style "bg=#af3a03,fg=#fbf1c7,bold"
setw -g mode-style "bg=#b57614,fg=#fbf1c7,bold"
setw -g clock-mode-colour "#b57614"

# Left — session (green block)
set -g status-left ' #[fg=#fbf1c7,bg=#79740e,bold] #S #[bg=#fbf1c7,nobold] '

# Windows — dim inactive, solid yellow block for the active one
setw -g window-status-format '#[fg=#a89984,bg=#fbf1c7] #I:#W#F '
setw -g window-status-current-format '#[fg=#fbf1c7,bg=#b57614,bold] #I:#W#F '
setw -g window-status-activity-style "fg=#af3a03,bg=#fbf1c7"
setw -g window-status-bell-style "fg=#9d0006,bg=#fbf1c7,bold"

# Right — git · dir · date · time (flat blocks)
set -g status-right '#[fg=#427b58,bg=#ebdbb2] #(git -C "#{pane_current_path}" rev-parse --abbrev-ref HEAD 2>/dev/null || echo -) #[fg=#bdae93,bg=#fbf1c7] #[fg=#8f3f71,bg=#ebdbb2] #{b:pane_current_path} #[fg=#bdae93,bg=#fbf1c7] #[fg=#3c3836,bg=#ebdbb2] %a %d %b #[fg=#bdae93,bg=#fbf1c7] #[fg=#fbf1c7,bg=#b57614,bold] %H:%M '
